# Kali Linux 渗透测试环境插件
plugins:
  - name: "kali"
    version: "1.0.0"
    author: "wu22"
    type: "exec"
    agent_type: "worker"
    bound_action: "execute_command"
    requires_confirmation: true
    description: "Kali Linux 渗透测试环境 — 内置 nmap、nikto、sqlmap、gobuster、hydra、dirb、wfuzz、searchsploit、john、enum4linux 等工具，用于安全审计和漏洞挖掘"
    container_name: "kali_pentest"
    image: "kali-pentest:latest"
    entrypoint_cmd: "bash -c"
    network_mode: "bridge"
    privileged: true
    timeout_seconds: 120
    mount_dirs: ["./workspace:/workspace:rw"]
    category: "shell"
    icon: "target"
    parameters:
      command:
        type: "string"
        description: "要执行的 Kali 命令，如 'nmap -sV target_ip'"
    required_params: ["command"]
