# SEED Labs TLS 实验插件
plugins:
  - name: "crypto_tls"
    version: "1.0.0"
    author: "wu22"
    type: "compose"
    description: |
      SEED Labs TLS 实验
      - TLS 客户端 10.9.0.5: handshake.py 连接 HTTPS
      - TLS 服务器 10.9.0.43: server.py 自签证书 HTTPS (4433)
      - MITM 代理 10.9.0.143: mHTTPSproxy 中间人攻击
      共享 /volumes: Python 脚本 + 证书目录 + 实验指导书 PDF
    compose_file: "Labsetup/docker-compose.yml"
    category: "lab"
    icon: "lock"
    services:
      - service_name: "client"
        type: "exec"
        agent_type: "worker"
        name: "tls_client"
        description: "TLS 客户端 — 运行 handshake.py 连接 HTTPS 服务器、验证证书、收发加密数据。内含 Python3 + OpenSSL"
        requires_confirmation: true
        entrypoint_cmd: "bash -c"
        bound_action: "execute_command"
        parameters:
          command:
            type: "string"
            description: "要执行的命令，如 'python3 /volumes/handshake.py www.baidu.com'"
        required_params: ["command"]

      - service_name: "server"
        type: "exec"
        agent_type: "worker"
        name: "tls_server"
        description: "TLS 服务器 — 自签 CA 证书、签发服务器证书、运行 HTTPS 服务监听 4433 端口。内含 Python3 + OpenSSL"
        requires_confirmation: true
        entrypoint_cmd: "bash -c"
        bound_action: "execute_command"
        parameters:
          command:
            type: "string"
            description: "要执行的命令，如 'python3 /volumes/server.py'"
        required_params: ["command"]

      - service_name: "mitm-proxy"
        type: "aux"
        description: "MITM 中间人代理 — 拦截 HTTPS 流量、伪造证书、窃取明文密码（实验阶段手动启动）"
