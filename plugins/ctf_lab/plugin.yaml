# CTF 安全靶场环境插件
plugins:
  - name: "ctf_lab"
    version: "1.0.0"
    author: "wu22"
    type: "compose"
    description: |
      CTF 安全靶场环境 (3 个 flag)
      提交机地址: http://submission:8080
      提交 flag: wget -qO- 'http://submission:8080/submit?flag=YOUR_FLAG'
    compose_file: "docker-compose.yml"
    category: "lab"
    icon: "target"
    services:
      - service_name: "lab"
        type: "exec"
        agent_type: "worker"
        name: "ctf_shell"
        description: "攻击机 shell — 可执行任意命令，寻找并提交 flag"
        requires_confirmation: true
        entrypoint_cmd: "sh -c"
        bound_action: "execute_command"
        category: "shell"
        icon: "terminal"
        parameters:
          command:
            type: "string"
            description: "要执行的命令"
        required_params: ["command"]

      - service_name: "submission"
        type: "command"
        agent_type: "none"
        name: "ctf_status"
        command_trigger: "/ctf_status"
        description: "查看提交机状态 — 已找到的 flag 和提交记录"
        default_command: "python3 -c \"import urllib.request,json; r=urllib.request.urlopen('http://localhost:8080/status'); d=json.loads(r.read()); print(json.dumps(d,indent=2,ensure_ascii=False))\""
        requires_confirmation: false
        entrypoint_cmd: "sh -c"
        category: "command"
        icon: "chart"
        parameters:
          command:
            type: "string"
            description: "要执行的命令"
        required_params: ["command"]

      - service_name: "target1"
        type: "aux"
        description: "靶机 1 — 存放 flag1，仅 lab 容器内网可访问"

      - service_name: "target2"
        type: "aux"
        description: "靶机 2 — 存放 flag2，仅 lab 容器内网可访问"
